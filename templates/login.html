<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — Task Tracker</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    width: 100%; max-width: 420px; background: white; border-radius: 16px; padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 { margin: 0 0 8px; font-size: 28px; color: #1a202c; }
  .subtitle { margin: 0 0 24px; color: #718096; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #2d3748; margin: 14px 0 6px; }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-size: 15px; transition: border-color .15s, box-shadow .15s;
  }
  input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
  button {
    width: 100%; margin-top: 20px; padding: 12px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: transform .1s, box-shadow .15s;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(102,126,234,.4); }
  .links { margin-top: 18px; text-align: center; font-size: 14px; }
  .links a { color: #667eea; text-decoration: none; font-weight: 500; }
  .links a:hover { text-decoration: underline; }
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  .alert-error { background: #fed7d7; color: #822727; }
  .alert-info  { background: #c6f6d5; color: #22543d; }
</style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your Task Tracker</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required value="{{ email }}" autofocus />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />
      <button type="submit">Sign in</button>
    </form>
    <div class="links">
      <a href="{{ url_for('forgot_password_page') }}">Forgot your password?</a>
      <span style="margin: 0 8px; color: #cbd5e0;">·</span>
      <a href="{{ url_for('signup_page') }}">Create account</a>
    </div>
  </div>
</body>
</html>
