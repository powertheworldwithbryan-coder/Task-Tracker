<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Set password — Task Tracker</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { width: 100%; max-width: 420px; background: white; border-radius: 16px; padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  h1 { margin: 0 0 8px; font-size: 26px; color: #1a202c; }
  .subtitle { margin: 0 0 24px; color: #718096; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #2d3748; margin: 14px 0 6px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
  input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
  button { width: 100%; margin-top: 22px; padding: 12px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 15px; font-weight: 600; cursor: pointer; }
  .links { margin-top: 18px; text-align: center; font-size: 14px; }
  .links a { color: #667eea; text-decoration: none; font-weight: 500; }
  .alert { padding: 12px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; background: #fed7d7; color: #822727; }
</style>
</head>
<body>
  <div class="card">
    <h1>Set a new password</h1>
    {% if not token %}
      <div class="alert">{{ error or "This link is invalid or has expired." }}</div>
      <div class="links"><a href="{{ url_for('forgot_password_page') }}">Request a new link</a></div>
    {% else %}
      <p class="subtitle">Choose a strong password (8+ characters).</p>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="POST">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required minlength="8" autofocus />
        <label for="password_confirm">Confirm password</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="8" />
        <button type="submit">Update password</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
