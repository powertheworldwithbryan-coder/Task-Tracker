<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign up — Task Tracker</title>
<link rel="stylesheet" href="data:text/css," />
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    width: 100%; max-width: 440px; background: white; border-radius: 16px; padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 { margin: 0 0 8px; font-size: 28px; color: #1a202c; }
  .subtitle { margin: 0 0 24px; color: #718096; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #2d3748; margin: 14px 0 6px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
  input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
  .hint { font-size: 12px; color: #a0aec0; margin-top: 4px; }
  button {
    width: 100%; margin-top: 24px; padding: 12px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(102,126,234,.4); }
  .links { margin-top: 18px; text-align: center; font-size: 14px; }
  .links a { color: #667eea; text-decoration: none; font-weight: 500; }
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  .alert-error { background: #fed7d7; color: #822727; }
</style>
</head>
<body>
  <div class="card">
    <h1>Create your account</h1>
    <p class="subtitle">Start tracking tasks in seconds.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" value="{{ name }}" placeholder="What should we call you?" />
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required value="{{ email }}" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="8" />
      <div class="hint">At least 8 characters.</div>
      <button type="submit">Create account</button>
    </form>
    <div class="links">
      Already have an account? <a href="{{ url_for('login_page') }}">Sign in</a>
    </div>
  </div>
</body>
</html>
